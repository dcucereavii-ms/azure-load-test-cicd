name: load-test-gate

# Demo 8 — Make load testing a quality gate in CI/CD.
#
# Required GitHub repo secrets (Settings → Secrets and variables → Actions):
#   AZURE_CLIENT_ID        - federated App registration appId
#   AZURE_TENANT_ID
#   AZURE_SUBSCRIPTION_ID
#
# Required GitHub repo variables:
#   ALT = cgov-alt-fovgoutjv2ah6
#   RG  = rg-cgov-workshop

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write   # required for OIDC federated login
  contents: read

jobs:
  load-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC, no secrets)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Azure Load Test
        uses: azure/load-testing@v1
        with:
          loadTestConfigFile: loadtest/api-config.yaml
          loadTestResource:   ${{ vars.ALT }}
          resourceGroup:      ${{ vars.RG }}

      - name: Upload JMeter results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: loadtest-results-${{ github.run_id }}
          path: loadTest
