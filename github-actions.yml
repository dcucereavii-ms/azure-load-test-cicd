# Demo 8 — GitHub Actions: build → deploy → load-test → gate
#
# Trigger:  push to main, or manual run-workflow.
# OIDC federated credentials → no client secret.
#
# Required GitHub repo secrets (Settings → Secrets → Actions):
#   AZURE_CLIENT_ID        - federated App registration
#   AZURE_TENANT_ID
#   AZURE_SUBSCRIPTION_ID
#
# Required GitHub repo variables:
#   RG=rg-cgov-workshop
#   ACR=cgovacrfovgoutjv2ah6
#   APP=cgov-app-fovgoutjv2ah6
#   ALT=cgov-alt-fovgoutjv2ah6

name: build-deploy-loadtest

on:
  push: { branches: [main] }
  workflow_dispatch:

permissions:
  id-token: write   # for OIDC
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR build
        run: |
          cd workshop/artifacts/sut-dotnet
          TAG=${{ github.sha }}
          az acr build \
            --registry ${{ vars.ACR }} \
            --resource-group ${{ vars.RG }} \
            --image contosogov-web:$TAG \
            --image contosogov-web:latest \
            .
          echo "TAG=$TAG" >> $GITHUB_ENV

      - name: Deploy revision
        run: |
          az containerapp update \
            -g ${{ vars.RG }} -n ${{ vars.APP }} \
            --image ${{ vars.ACR }}.azurecr.io/contosogov-web:${{ env.TAG }} \
            --output none

      - name: Wait for revision healthy
        run: |
          for i in $(seq 1 30); do
            STATE=$(az containerapp revision list -g ${{ vars.RG }} -n ${{ vars.APP }} \
                     --query "[?properties.active].properties.healthState | [0]" -o tsv)
            echo "  health: $STATE"
            [[ "$STATE" == "Healthy" ]] && break
            sleep 10
          done

  load-test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Official Microsoft action — uploads JMX/CSV, runs test, parses fail criteria.
      - name: Azure Load Test
        uses: azure/load-testing@v1
        with:
          loadTestConfigFile: workshop/demos/api-config.yaml
          loadTestResource:   ${{ vars.ALT }}
          resourceGroup:      ${{ vars.RG }}
          # Pass-through of env vars defined in the yaml; overridable here too:
          env: |
            [
              { "name": "host",     "value": "cgov-app-fovgoutjv2ah6.purplestone-67b90e2b.eastus2.azurecontainerapps.io" },
              { "name": "duration", "value": "180" }
            ]

      - name: Upload JMeter results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: loadtest-results-${{ github.run_id }}
          path: loadTest
